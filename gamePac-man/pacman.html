<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <title>Pacman</title>
</head>

<body id="body">

    <button class="btn btn-warning" data-bs-toggle="modal" data-bs-target="#miModal">
        Iniciar Juego!
    </button>

    <div class="modal fade" id="miModal" tabindex="-1">
        <div class="modal-dialog modal-500">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Pacman</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body modal-body-pacman">

                    <canvas id="canvas" width="420" height="540"></canvas>
                    <div style="display:none;">
                        <img id="animation" src="animations.gif" width="140" height="20">
                        <img id="ghosts" src="ghost.png" width="140" height="20">
                    </div>
                    <script src="ghost.js"></script>
                    <script src="pacman.js"></script>
                    <script src="game.js"></script>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-primary" id="restart">Reiniciar</button>
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
                </div>

            </div>
        </div>
    </div>


</body>

</html>
